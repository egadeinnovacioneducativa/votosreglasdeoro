<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de REGLAS DE ORO</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900 border-t-8 border-[#0033a0]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Componente de Icono estable (SVG directo) para evitar conflictos con el DOM de React
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                award: <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526" />,
                beaker: <path d="M4.5 3h15M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3M6 14h12" />,
                lightbulb: <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5M9 18h6M10 22h4" />,
                'check-circle-2': <g><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></g>,
                quote: <path d="M3 21c3 0 7-1 7-8V5H3v8h4c0 2-1 3-4 5zM14 21c3 0 7-1 7-8V5h-7v8h4c0 2-1 3-4 5z" />,
                'bar-chart-3': <path d="M3 3v18h18M18 17V9M13 17V5M8 17v-3" />
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const initialData = [
                { 
                    name: 'Mesa 1', oro: 0, plata: 3, rojo: 1, color: '#0033a0',
                    idea: '“Si no usas datos en tiempo real para decidir, estás compitiendo a ciegas.”'
                },
                { 
                    name: 'Mesa 2', oro: 2, plata: 4, rojo: 1, color: '#000000',
                    idea: '“Las empresas que aprenden más rápido que su mercado son las que sobreviven.”'
                },
                { 
                    name: 'Mesa 3', oro: 4, plata: 1, rojo: 2, color: '#3b82f6',
                    idea: '“El producto ya no es suficiente: el valor está en el ecosistema.”'
                },
                { 
                    name: 'Mesa 4', oro: 2, plata: 2, rojo: 0, color: '#6366f1',
                    idea: '“Las marcas que no generan confianza radical, pierden clientes silenciosamente.”'
                },
                { 
                    name: 'Mesa 5', oro: 2, plata: 0, rojo: 1, color: '#14b8a6',
                    idea: '“La innovación real hoy incomoda al modelo de negocio existente.”'
                },
            ];

            const categories = [
                { key: 'oro', label: 'Oro (Industria)', color: 'bg-[#D4AF37]', icon: 'award', desc: 'Pertinencia de Mercado' },
                { key: 'plata', label: 'Plata (Academia)', color: 'bg-[#C0C0C0]', icon: 'beaker', desc: 'Potencia de Investigación' },
                { key: 'rojo', label: 'Rojo (Idea)', color: 'bg-[#E63946]', icon: 'lightbulb', desc: 'Idea Disruptiva' },
            ];

            const [activeMesas, setActiveMesas] = useState(initialData.map(m => m.name));
            const maxValue = 4;
            const logoUrl = "https://image.admisiones.tec.mx/lib/fe2b11747364057f721176/m/1/b910ad21-1913-4ce0-8f35-38c908814125.png";

            const toggleMesa = (name) => {
                setActiveMesas(prev => 
                    prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]
                );
            };

            const getRadarPoints = (item, center = 100, radius = 80) => {
                const points = [];
                const angles = [-Math.PI / 2, Math.PI / 6, (5 * Math.PI) / 6];
                angles.forEach((angle, i) => {
                    const val = item[categories[i].key];
                    const distance = (val / maxValue) * radius;
                    const x = center + distance * Math.cos(angle);
                    const y = center + distance * Math.sin(angle);
                    points.push(`${x},${y}`);
                });
                return points.join(' ');
            };

            return (
                <div className="max-w-6xl mx-auto p-6 md:p-12 space-y-12">
                    {/* Header Institucional */}
                    <header className="flex flex-col md:flex-row items-center justify-between gap-6 border-b pb-8 border-gray-100">
                        <div className="space-y-2 text-center md:text-left">
                            <h1 className="text-4xl font-black tracking-tight text-black uppercase">
                                Dashboard de <span className="text-[#0033a0]">REGLAS DE ORO</span>
                            </h1>
                            <p className="text-lg text-gray-500 font-medium tracking-wide">
                                Análisis de Pertinencia e Innovación por Mesas de Trabajo
                            </p>
                        </div>
                        <img src={logoUrl} alt="Logo Tec" className="h-16 md:h-20 object-contain" />
                    </header>

                    {/* Leyenda de Categorías */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {categories.map((cat) => (
                            <div key={cat.key} className="bg-gray-50 p-5 rounded-lg border-l-4 border-black flex items-center gap-4 shadow-sm">
                                <div className={`${cat.color} p-3 rounded text-white`}>
                                    <Icon name={cat.icon} />
                                </div>
                                <div>
                                    <h3 className="font-bold text-black text-sm uppercase">{cat.label}</h3>
                                    <p className="text-xs text-gray-600 italic">{cat.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Estrella de Calor Unificada */}
                    <section className="bg-white rounded-3xl p-8 border border-gray-100 shadow-xl relative">
                        <div className="flex flex-col lg:flex-row items-center gap-12">
                            <div className="lg:w-1/3 space-y-6">
                                <div className="inline-flex items-center gap-2 px-3 py-1 bg-[#0033a0] text-xs font-bold rounded-full uppercase tracking-widest text-white">
                                    Análisis Comparativo
                                </div>
                                <h2 className="text-3xl font-bold leading-tight text-black text-pretty">Estrella de Calor Unificada</h2>
                                <p className="text-gray-500 text-sm">Active o desactive las mesas para comparar sus perfiles de impacto.</p>
                                <div className="grid grid-cols-1 gap-3 pt-4">
                                    {initialData.map(mesa => (
                                        <button 
                                            key={mesa.name} 
                                            onClick={() => toggleMesa(mesa.name)}
                                            className={`flex items-center justify-between p-3 rounded-lg border transition-all ${activeMesas.includes(mesa.name) ? 'bg-gray-50 border-gray-200' : 'opacity-40 hover:opacity-70'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className="w-3 h-3 rounded-full" style={{ backgroundColor: mesa.color }}></div>
                                                <span className="text-sm font-bold text-gray-700 uppercase">{mesa.name}</span>
                                            </div>
                                            {activeMesas.includes(mesa.name) && <Icon name="check-circle-2" size={14} className="text-[#0033a0]" />}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="lg:w-2/3 flex justify-center py-10">
                                <svg width="340" height="340" viewBox="0 0 200 200">
                                    {[1, 2, 3, 4].map(step => (
                                        <polygon key={step} points={`100,${100 - (step/4)*85} ${100 + (step/4)*73},${100 + (step/4)*42} ${100 - (step/4)*73},${100 + (step/4)*42}`} fill="none" stroke="#e2e8f0" strokeWidth="1" />
                                    ))}
                                    <line x1="100" y1="100" x2="100" y2="15" stroke="#cbd5e1" strokeDasharray="2" />
                                    <line x1="100" y1="100" x2="173" y2="142" stroke="#cbd5e1" strokeDasharray="2" />
                                    <line x1="100" y1="100" x2="27" y2="142" stroke="#cbd5e1" strokeDasharray="2" />
                                    <text x="100" y="10" textAnchor="middle" fill="#8B7500" fontSize="9" fontWeight="900">INDUSTRIA</text>
                                    <text x="195" y="152" textAnchor="end" fill="#64748b" fontSize="9" fontWeight="900">ACADEMIA</text>
                                    <text x="5" y="152" textAnchor="start" fill="#A80000" fontSize="9" fontWeight="900">IDEA</text>

                                    {initialData.map((mesa, i) => activeMesas.includes(mesa.name) && (
                                        <polygon key={i} points={getRadarPoints(mesa, 100, 85)} fill={`${mesa.color}15`} stroke={mesa.color} strokeWidth="3.5" strokeOpacity="1" className="transition-all duration-300" />
                                    ))}
                                </svg>
                            </div>
                        </div>
                    </section>

                    {/* Reglas de Oro Section */}
                    <section className="space-y-8">
                        <div className="flex items-center gap-3 border-b-2 border-black pb-2">
                            <Icon name="quote" className="text-[#0033a0]" />
                            <h2 className="text-xl font-bold uppercase tracking-tight">Reglas de Oro de los Negocios</h2>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {initialData.map((mesa, idx) => (
                                <div key={idx} className="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm border-t-4 hover:shadow-md transition-shadow" style={{ borderColor: mesa.color }}>
                                    <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest">{mesa.name}</span>
                                    <p className="mt-4 text-gray-800 font-serif text-lg italic leading-relaxed">{mesa.idea}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Matriz de Rendimiento Técnico */}
                    <section className="space-y-6">
                        <div className="flex items-center gap-2 border-b-2 border-[#0033a0] pb-2 text-[#0033a0]">
                            <Icon name="bar-chart-3" />
                            <h2 className="text-xl font-bold uppercase tracking-tight">Matriz de Rendimiento Técnico</h2>
                        </div>
                        <div className="overflow-x-auto rounded-xl border border-gray-100">
                            <table className="w-full text-sm">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="p-4 text-left font-black text-black">Mesa de Trabajo</th>
                                        {categories.map(cat => <th key={cat.key} className="p-4 text-center font-bold text-gray-500">{cat.label}</th>)}
                                    </tr>
                                </thead>
                                <tbody className="divide-y text-center">
                                    {initialData.map((mesa, idx) => (
                                        <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                            <td className="p-4 text-left font-bold uppercase tracking-tighter">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-1.5 h-6 rounded-full" style={{ backgroundColor: mesa.color }}></div>
                                                    {mesa.name}
                                                </div>
                                            </td>
                                            {categories.map(cat => {
                                                const val = mesa[cat.key];
                                                const bgOpacity = val === 0 ? 'bg-slate-50' : val >= 4 ? 'bg-blue-100' : 'bg-slate-50';
                                                return (
                                                    <td key={cat.key} className="p-3">
                                                        <div className={`h-10 rounded-lg flex items-center justify-center font-black text-lg ${bgOpacity}`} style={{ color: val === 0 ? '#cbd5e1' : '#000' }}>
                                                            {val}
                                                        </div>
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
